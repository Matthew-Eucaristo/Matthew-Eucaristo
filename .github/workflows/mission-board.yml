name: update-bingo-mission-board

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - closed
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write
  issues: read

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update mission board
        run: node scripts/update-mission-board.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit mission board update
        run: |
          if ! git diff --quiet README.md; then
            git add README.md
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "update bingo mission board [skip ci]"
            git push origin HEAD:${{ github.event.repository.default_branch }}
          fi
